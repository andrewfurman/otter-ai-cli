# Continuous integration: on every push and pull request, GitHub runs this on
# a fresh Ubuntu VM. (The .github/workflows/ folder name is mandated by GitHub
# Actions and cannot be renamed.)
name: CI (format, lint, tests)

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - "*"

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: rustfmt, clippy

            # Fails if the code isn't rustfmt-formatted
            - name: Check formatting
              run: cargo fmt --all --check

            # Linter; any warning fails the build
            - name: Lint
              run: cargo clippy --all-targets -- -D warnings

            # Unit tests. The live API tests (tests/live.rs) skip themselves
            # here because OTTERAI_USERNAME/OTTERAI_PASSWORD are not set in CI.
            - name: Run tests
              run: cargo test
